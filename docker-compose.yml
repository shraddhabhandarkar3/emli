services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: emli_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-emli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emli}
      POSTGRES_DB:       ${POSTGRES_DB:-emli}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - emli_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emli} -d ${POSTGRES_DB:-emli}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Ollama (local LLM — only needed when LLM_PROVIDER=ollama) ──────────────
  # Model weights are stored in the ollama_data volume — persisted across restarts.
  # Pull the model once with: make pull-model
  ollama:
    image: ollama/ollama
    container_name: emli_ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Pipeline (one-shot: fetch → ETL → Notion sync) ─────────────────────────
  # Not started by `docker compose up`. Run via: make pipeline-docker
  # Requires token/ and client_secret.json to exist (run `make auth` first).
  pipeline:
    build: .
    image: emli-pipeline:latest
    container_name: emli_pipeline
    profiles: [pipeline]
    env_file: .env
    environment:
      # Override to use Docker-internal hostnames instead of localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-emli}:${POSTGRES_PASSWORD:-emli}@postgres:5432/${POSTGRES_DB:-emli}
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      # OAuth token and Gmail state persist on the host across runs
      - ./token:/app/token
      # Client secret is read-only inside the container
      - ./client_secret.json:/app/client_secret.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  emli_pgdata:
    name: emli_pgdata
  ollama_data:
    name: emli_ollama_data
